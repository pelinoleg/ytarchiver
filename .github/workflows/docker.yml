# Build & push backend + frontend images to ghcr.io.
#
# Triggers on every push to main + manual dispatch. Both images get
# multi-arch (linux/amd64 + linux/arm64) so a Mac (Apple Silicon) and a
# typical x86 Linux server can both ``docker pull`` without surprises.
#
# Tags applied per build:
#   • latest                — moves with main
#   • sha-<short-sha>       — pinpoint version for rollback
#   • v<semver>             — only when a tag like v1.2.3 is pushed
#
# Auth: ``GITHUB_TOKEN`` is enough — the workflow declares the
# ``packages: write`` permission and ghcr.io accepts it.

name: docker

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name:    backend
            context: ./backend
            image:   ghcr.io/${{ github.repository_owner }}/ytarchiver-backend
          - name:    frontend
            context: ./frontend
            image:   ghcr.io/${{ github.repository_owner }}/ytarchiver-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags / labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=ref,event=branch

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.name }}
