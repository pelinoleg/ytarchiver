# Production compose — uses prebuilt images from ghcr.io. No clone needed.
#
# Run on any host with Docker:
#
#     curl -O https://raw.githubusercontent.com/pelinoleg/ytarchiver/main/docker-compose.yml
#     docker compose up -d
#
# Open http://localhost:8080. nginx (frontend) serves the SPA and
# reverse-proxies /api + /ws to the backend container.
#
# Update to the latest published image:
#
#     docker compose pull && docker compose up -d
#
# State (SQLite DB + downloaded video files) lives on the HOST under
# ./data and ./downloads — explicit bind mounts, no named volumes, so
# you can ``ls`` and back them up with regular filesystem tools.

services:
  backend:
    image: ghcr.io/pelinoleg/ytarchiver-backend:latest
    container_name: ytarchiver-backend
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./downloads:/downloads
      # Drop your YouTube cookies.txt into ./cookies/youtube.txt to bypass
      # "Sign in to confirm you're not a bot" rate-limits. See README for
      # how to export. The mount is read-only — the backend never writes
      # back. Safe to leave the directory empty; backend boots regardless.
      - ./cookies:/cookies:ro
    environment:
      # ── Paths inside the container (match the volume targets above) ──
      DATA_DIR:     /data
      DOWNLOAD_DIR: /downloads
      DB_PATH:      /data/ytarchiver.db
      LOG_LEVEL:    INFO

      # ── Sync scheduler ──
      SYNC_INTERVAL_MINUTES:        240
      SYNC_JITTER_MINUTES:          60
      MAX_VIDEOS_PER_CHANNEL_SCAN:  50
      INITIAL_BACKFILL_HARD_CAP:    500

      # ── Quality / retention defaults ──
      DEFAULT_QUALITY:              "1080"
      DEFAULT_RETENTION_DAYS:       0
      DEFAULT_PLAYBACK_RATE:        1.0
      MUSIC_PLAYBACK_RATE:          1.0
      DELETE_AFTER_WATCHED_PERCENT: 0

      # ── Worker politeness ──
      BETWEEN_DOWNLOADS_MIN_SECONDS: 5
      BETWEEN_DOWNLOADS_MAX_SECONDS: 15

      # ── Hover-preview generation ──
      PREVIEW_WIDTH:                480
      PREVIEW_CRF:                  27
      PREVIEW_SEGMENTS:             12

      # ── Music UI ──
      MUSIC_QUEUE_PANEL_SIZE:       100
      MINI_PLAYER_ENABLED:          "true"

      # ── SponsorBlock ──
      SPONSORBLOCK_API:             https://sponsor.ajay.app
      SPONSORBLOCK_REFRESH_DAYS:    7

      # ── YouTube bot-detection bypass ──
      # Drop a Netscape-format cookies.txt at ``./cookies/youtube.txt`` on
      # the host (mounted read-only into /cookies) to make yt-dlp use your
      # browser session — the most reliable cure for "Sign in to confirm
      # you're not a bot" errors. If the file is missing the backend just
      # runs without cookies (default behavior).
      COOKIES_FILE: /cookies/youtube.txt

      # Force a specific yt-dlp player client. Empty = let yt-dlp pick.
      # Try "android" if you keep hitting bot walls — it talks to a
      # different YT endpoint that's sometimes more lenient than ``web``.
      YOUTUBE_PLAYER_CLIENT: ""

      # ── CORS ──
      # Comma-separated list of allowed origins, or ``*`` for any.
      # Tighten to ``https://your.domain`` in production.
      CORS_ORIGINS: "*"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: ghcr.io/pelinoleg/ytarchiver-frontend:latest
    container_name: ytarchiver-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # Change the LEFT side if 8080 is already taken on your host.
    ports:
      - "8080:80"
