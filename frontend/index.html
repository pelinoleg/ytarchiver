<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>YT Archive</title>

    <!-- PWA -->
    <link rel="manifest"        href="/manifest.webmanifest" />
    <meta name="theme-color"    content="#09090b" />
    <meta name="color-scheme"   content="dark" />
    <meta name="application-name" content="YT Archive" />
    <meta name="description"    content="Self-hosted YouTube archive" />

    <!-- Icons (order matters — first match wins per format) -->
    <link rel="icon"            href="/favicon.ico"          sizes="any" />
    <link rel="icon"            href="/icon.svg"             type="image/svg+xml" />
    <link rel="icon"            href="/favicon-32.png"       sizes="32x32" type="image/png" />
    <link rel="icon"            href="/favicon-16.png"       sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />

    <!-- iOS PWA shell -->
    <meta name="apple-mobile-web-app-capable"           content="yes" />
    <meta name="mobile-web-app-capable"                 content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style"  content="black-translucent" />
    <meta name="apple-mobile-web-app-title"             content="YT Archive" />
    <meta name="format-detection"                       content="telephone=no" />
  </head>
  <body class="bg-zinc-950 text-zinc-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
