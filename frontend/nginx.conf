# Map Connection header so the upstream gets the WebSocket upgrade correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large JSON backup uploads / playlist imports.
    client_max_body_size 64m;

    # ── API ─────────────────────────────────────────────────────────────────
    # Both /api (REST + video streaming) and /ws (download-progress socket)
    # forward to the backend service inside the compose network. The host
    # ``backend`` resolves via Docker's built-in DNS — no IP wiring needed.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Range requests for /api/stream/* (video seeking) — pass through.
        proxy_set_header   Range             $http_range;
        proxy_set_header   If-Range          $http_if_range;
        proxy_buffering    off;

        # Long-lived downloads / scans — generous timeouts.
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location /ws {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    # Vite emits content-hashed JS / CSS under /assets/ — those can sit in
    # the browser cache forever; the HTML shell must not.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        # SPA: any unknown path is React-Router territory → serve index.html.
        try_files $uri $uri/ /index.html;
        # Don't cache the shell — it references the latest hashed assets
        # and we want users to pick up new builds on next visit.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
